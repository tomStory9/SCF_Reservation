grumphp:
    fixer:
        enabled: true
        fix_by_default: true
    tasks:
        phplint:
            triggered_by: ['php']

        phpcsfixer:
            config: '.php-cs-fixer.dist.php'
            triggered_by: ['php']
        shell:
            scripts:
              - ['composer', 'db']
              - ['php', 'bin/console', 'doctrine:fixtures:load', '--no-interaction']

        
