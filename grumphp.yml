grumphp:
  process_timeout: 5000000
  fixer:
    enabled: true
    fix_by_default: true

  tasks:
    phplint:
      triggered_by: ['php']

    phpcsfixer:
      config: '.php-cs-fixer.dist.php'
      triggered_by: ['php']

    shell:
      scripts:
        - ['-c', 'composer db']
        - ['-c', 'php bin/console doctrine:fixtures:load --no-interaction']